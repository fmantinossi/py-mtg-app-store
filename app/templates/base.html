{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antinossi MTG App Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="{% url 'cards' %}" class="logo">MTG Store</a>
            <nav class="main-nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'cards' %}" class="nav-link">Cards</a>
                    <a href="{% url 'new_card' %}" class="nav-link">New Card</a>    
                    <a href="{% url 'logout' %}" class="nav-link">Log out</a>
                {% endif %}

                {% if not user.is_authenticated%}
                    <a href="{% url 'register' %}" class="nav-link">Register</a>    
                    <a href="{% url 'login' %}" class="nav-link">Log in</a>
                    <a href="{% url 'cards' %}" class="nav-link">Cards</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2026 Antinossi MTG Store. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>

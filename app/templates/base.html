{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antinossi MTG App Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body>
    <header class="main-header">
        <div class="header-container stacked-header">
            <div class="header-top">
                <a href="{% url 'cards' %}" class="logo">
                    <img src="{% static 'store/images/new_principal_logo_site.png' %}" alt="MTG Store Logo" class="logo-image">
                </a>
                
                <div class="header-search">
                    <form method="GET" action="{% url 'cards' %}" class="search-form">
                        <input
                            type="text"
                            name="search"
                            placeholder="Search cards..."
                            value="{{ request.GET.search|default:'' }}"
                            class="search-input"
                        />
                        <button type="submit" class="search-button">Search</button>
                    </form>
                </div>
                
                <div class="header-spacer"></div>
            </div>

            <nav class="main-nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'cards' %}" class="nav-link">Cards</a>
                    <a href="{% url 'new_card' %}" class="nav-link">New Card</a>    
                    <a href="{% url 'logout' %}" class="nav-link">Log out</a>
                {% endif %}

                {% if not user.is_authenticated%}
                    <a href="{% url 'cards' %}" class="nav-link">Cards</a>
                    <a href="{% url 'register' %}" class="nav-link">Register</a>    
                    <a href="{% url 'login' %}" class="nav-link">Log in</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2026 Antinossi MTG Store. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>

{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="card-form-container">
    <div class="card-form-header">
        <h1>Update Card: {{ card.name }}</h1>
        <p>Edit the details below to update the card information.</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="modern-card-form">
        {% csrf_token %}
        
        <div class="form-grid">
            {% for field in form %}
                <div class="form-group {% if field.errors %}has-error{% endif %}">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="field-error">
                            {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>

        <div class="form-actions">
            <button type="submit" class="submit-button">Update Card</button>
            <a href="{% url 'card_detail' card.pk %}" class="cancel-button">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
